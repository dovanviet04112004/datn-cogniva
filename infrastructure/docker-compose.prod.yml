# Cogniva — Production realtime stack.
#
# Khác `docker-compose.dev.yml`:
#   - LiveKit dùng host network (cần cho UDP range 50000-60000 trên Linux).
#   - coturn relay cho 10-15% user behind symmetric NAT.
#   - Socket.IO gateway (apps/realtime) sau Caddy (Redis adapter để fan-out đa replica).
#   - Caddy front: TLS auto + reverse proxy WS.
#   - Hocuspocus cho Yjs collab (Phase 14+).
#
# Deploy:
#   cp infrastructure/.env.example infrastructure/.env
#   # Điền giá trị thật cho LIVEKIT_API_KEY, INTERNAL_API_URL, APP_ORIGIN, R2_*, etc.
#   docker compose -f docker-compose.prod.yml up -d
#
# Lưu ý host network: LiveKit + coturn không expose ports qua bridge,
# bind trực tiếp host. UFW firewall đã được cấu hình bởi
# `scripts/provision-server.sh` cho từng role.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    network_mode: host
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit/livekit.prod.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  realtime:
    # Socket.IO gateway (apps/realtime) — build từ repo root context.
    build:
      context: ..
      dockerfile: apps/realtime/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:6002:6002"     # Chỉ bind localhost, Caddy proxy ra ngoài qua 443
    environment:
      PORT: "6002"
      # Adapter + presence — TRÙNG Redis với emitter ở apps/web.
      REDIS_URL: redis://redis:6379
      # Verify session/authorize qua Next (chạy trên host:3000). host-gateway = IP host.
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://host.docker.internal:3000}
      # Origin web cho CORS cookie (mobile dùng bearer, không bị CORS).
      CORS_ORIGIN: ${APP_ORIGIN:-https://app.cogniva.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    # Scale >1 cần orchestrator (swarm/k8s) + Caddy load-balance nhiều upstream;
    # `docker compose up` chạy 1 container. Redis adapter đã sẵn sàng fan-out đa replica.
    deploy:
      replicas: 2

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"             # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [realtime]

  # Hocuspocus (Phase 14) — uncomment khi build whiteboard/notes collab
  # hocuspocus:
  #   image: cogniva/hocuspocus:latest
  #   build: ./hocuspocus
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:1234:1234"
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL}
  #     REDIS_URL: redis://redis:6379
  #     JWT_SECRET: ${JWT_SECRET}
  #   depends_on: [redis]

  # Egress (Phase 15) — uncomment khi build recording
  # livekit-egress:
  #   image: livekit/egress:latest
  #   restart: unless-stopped
  #   cap_add: [SYS_ADMIN]
  #   network_mode: host
  #   volumes:
  #     - ./livekit/egress.yaml:/etc/egress.yaml:ro

  # ── BullMQ worker (background jobs) ──────────────────────────
  # apps/web KHÔNG container-hoá ở stack này (chạy `next start` trên host) → worker
  # cũng chạy TRÊN HOST cho đồng bộ (chia sẻ code apps/web):
  #   pnpm --filter @cogniva/web worker     # qua PM2/systemd, cạnh `next start`
  #   (cần REDIS_URL=redis://localhost:6379, DATABASE_URL, R2_*, các key AI như next)
  # Nếu sau này container-hoá apps/web (thêm Dockerfile), bật service dưới:
  # worker:
  #   build: { context: .., dockerfile: apps/web/Dockerfile }
  #   restart: unless-stopped
  #   command: ["pnpm", "--filter", "@cogniva/web", "worker"]
  #   environment:
  #     REDIS_URL: redis://redis:6379
  #     DATABASE_URL: ${DATABASE_URL}
  #   depends_on:
  #     redis: { condition: service_healthy }

volumes:
  redis-data:
  caddy-data:
  caddy-config:
