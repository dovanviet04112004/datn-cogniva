# Cogniva — Local dev stack cho realtime infrastructure.
#
# Mục tiêu: chạy LiveKit + Redis trên localhost để dev Phase 13+ mà không cần VPS
# thật. Khác `docker-compose.prod.yml` ở:
#   - Không có coturn (local NAT thường không cần TURN relay).
#   - Không có Caddy (không TLS — chỉ ws://, không wss://).
#   - LiveKit dev key/secret (không sensitive, OK commit).
#   - Không Hocuspocus (Phase 14+ mới cần).
#
# Gateway Socket.IO (apps/realtime) KHÔNG chạy trong compose này — dev chạy thẳng
# trên host để hot-reload nhanh, DÙNG redis của compose:
#   REDIS_URL=redis://localhost:6379 INTERNAL_API_URL=http://localhost:3000 \
#     pnpm --filter @cogniva/realtime dev   # nghe ws://localhost:6002
# (apps/web set NEXT_PUBLIC_REALTIME_URL=ws://localhost:6002)
#
# Sau khi `docker compose up -d`:
#   - LiveKit signaling : ws://localhost:7880
#   - Redis             : localhost:6379 (cho LiveKit + Socket.IO adapter/emitter)
#
# Lưu ý: trên Windows/Mac, Docker Desktop bridge mode hoạt động OK cho
# LiveKit dev (không cần host network). Trên Linux prod thì PHẢI host
# network mode vì UDP range 50000-60000 nhiều port.
services:
  redis:
    image: redis:7-alpine
    container_name: cogniva-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: cogniva-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml --dev
    ports:
      - "7880:7880"               # WebSocket signaling
      - "7881:7881"               # WebRTC over TCP fallback
      - "50000-50100:50000-50100/udp"  # Dev: chỉ 100 port UDP, prod range rộng hơn
    volumes:
      - ./livekit/livekit.dev.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
